<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Android adaptive-icon FOREGROUND only (background is a solid color set in
       app.json). Art kept within the central safe zone so launcher masks don't
       crop it. Transparent canvas. -->

  <!-- Sun -->
  <g transform="translate(512 430)">
    <circle r="150" fill="#ffd76e" opacity="0.22"/>
    <circle r="116" fill="#ffd76e" opacity="0.34"/>
    <circle r="86" fill="#ffe08a"/>
  </g>

  <!-- Compact stacked tower, centered -->
  <g>
    <rect x="362" y="690" width="300" height="70" rx="16" fill="#7ec8a9"/>
    <rect x="387" y="620" width="250" height="70" rx="16" fill="#f2c14e"/>
    <rect x="417" y="550" width="190" height="70" rx="16" fill="#e8825a"/>
  </g>
</svg>
