<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <span id="score">0</span>
  </div>

  <div id="overlay" class="screen">
    <h1>STACK</h1>
    <p id="ovtext">Tap, click, or press space to drop a block.<br>Line it up. Don't miss.</p>
    <div class="cta" id="cta">Tap to start</div>
    <p id="best"></p>
  </div>
</div>

<style>
  #wrap{
    position:relative; width:100%; max-width:420px; height:600px;
    margin:0 auto; border-radius:16px; overflow:hidden;
    background:#0d0f14; box-shadow:0 1px 0 rgba(255,255,255,.05) inset;
    font-family:var(--font-sans, ui-sans-serif, system-ui, sans-serif);
    user-select:none; -webkit-user-select:none; touch-action:manipulation;
  }
  #game{ display:block; width:100%; height:100%; }
  #hud{
    position:absolute; top:0; left:0; right:0; padding:18px 0 0;
    text-align:center; pointer-events:none; opacity:0; transition:opacity .25s;
  }
  #hud.show{ opacity:1; }
  #score{
    font-size:52px; font-weight:500; color:#fff; letter-spacing:-1px;
    text-shadow:0 2px 24px rgba(0,0,0,.4);
  }
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    gap:14px; padding:24px; color:#e8eaf0;
    background:radial-gradient(120% 80% at 50% 30%, rgba(40,52,78,.55), rgba(13,15,20,.92));
    transition:opacity .25s; cursor:pointer;
  }
  .screen.hidden{ opacity:0; pointer-events:none; }
  .screen h1{
    margin:0; font-size:46px; font-weight:500; letter-spacing:6px;
    color:#fff;
  }
  .screen p{ margin:0; font-size:15px; line-height:1.6; color:#9aa3b8; max-width:280px; }
  .cta{
    margin-top:6px; padding:11px 26px; border-radius:999px;
    background:#fff; color:#0d0f14; font-size:15px; font-weight:500;
    animation:pulse 1.6s ease-in-out infinite;
  }
  #best{ font-size:13px; color:#6b7388; min-height:16px; }
  @keyframes pulse{ 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.05); } }
  @media (prefers-reduced-motion: reduce){ .cta{ animation:none; } }
</style>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('wrap');
  const overlay = document.getElementById('overlay');
  const ovText = document.getElementById('ovtext');
  const ctaEl = document.getElementById('cta');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const hud = document.getElementById('hud');

  // ---- tuning ----
  const BLOCK_H = 28;        // logical px per block
  const PERFECT = 4;         // px tolerance for a "perfect" drop (no shrink)
  const BASE_SPEED = 0.17;   // px per ms
  const MAX_SPEED = 0.5;
  const SPEED_STEP = 0.011;
  const GRAVITY = 0.0024;    // debris fall accel (px/ms^2)

  // ---- 1. STATE MACHINE ----
  // The only thing React-equivalent UI cares about. Changes a few times per game.
  let phase = 'idle'; // 'idle' | 'playing' | 'over'

  // ---- 2. THE WORLD ----
  // Mutable game state. In a React app this lives in a ref, NEVER useState —
  // it's rewritten ~60x/sec and must not trigger re-renders.
  let W = 0, H = 0, dpr = 1;
  let world = null;
  let best = 0;

  function freshWorld() {
    const baseW = W * 0.55;
    return {
      blocks: [{ x: (W - baseW) / 2, width: baseW }], // settled tower (base = index 0)
      current: null,   // the moving block being aimed
      debris: [],      // sliced-off pieces flying away (pure eye candy)
      pulses: [],      // perfect-drop flashes
      cameraY: 0,
      score: 0,
    };
  }

  function hue(i) { return (192 + i * 9) % 360; }

  function spawnCurrent() {
    const top = world.blocks[world.blocks.length - 1];
    world.current = {
      x: 0,
      width: top.width,
      dir: 1,
      speed: Math.min(MAX_SPEED, BASE_SPEED + world.score * SPEED_STEP),
    };
  }

  // world Y is measured upward from the ground; convert a block's top edge to a screen y
  function screenTop(index) {
    return H - (index + 1) * BLOCK_H + world.cameraY;
  }

  // ---- 3. GAME LOOP (requestAnimationFrame + delta time) ----
  let last = 0;
  function loop(t) {
    const dt = Math.min(50, t - last); // clamp so a backgrounded tab doesn't explode
    last = t;
    if (phase === 'playing') update(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ---- 4. UPDATE ----
  function update(dt) {
    const c = world.current;
    // move + bounce off the walls
    c.x += c.dir * c.speed * dt;
    if (c.x <= 0) { c.x = 0; c.dir = 1; }
    else if (c.x + c.width >= W) { c.x = W - c.width; c.dir = -1; }

    // camera glides up so the active block stays ~1/3 down the screen
    const target = Math.max(0, (world.blocks.length + 1) * BLOCK_H - H * 0.68);
    world.cameraY += (target - world.cameraY) * Math.min(1, dt * 0.008);

    // debris physics
    for (const d of world.debris) {
      d.vy += GRAVITY * dt;
      d.sy += d.vy * dt;
      d.sx += d.vx * dt;
      d.rot += d.vr * dt;
      d.alpha -= dt * 0.0014;
    }
    world.debris = world.debris.filter(d => d.alpha > 0 && d.sy < H + 80);

    for (const p of world.pulses) p.life -= dt * 0.004;
    world.pulses = world.pulses.filter(p => p.life > 0);
  }

  // ---- 5. THE MECHANIC (drop / slice) ----
  function drop() {
    const c = world.current;
    const below = world.blocks[world.blocks.length - 1];
    const delta = c.x - below.x;

    // perfect drop: snap to full width, no shrink, reward flash
    if (Math.abs(delta) <= PERFECT) {
      world.blocks.push({ x: below.x, width: below.width });
      world.pulses.push({ sx: below.x + below.width / 2, sy: screenTop(world.blocks.length - 1), w: below.width, life: 1 });
      world.score++;
      scoreEl.textContent = world.score;
      spawnCurrent();
      return;
    }

    const left = Math.max(c.x, below.x);
    const right = Math.min(c.x + c.width, below.x + below.width);
    const overlap = right - left;

    if (overlap <= 0) { gameOver(); return; } // missed entirely

    const idx = world.blocks.length;          // index the placed block will take
    const placedTop = H - (idx + 1) * BLOCK_H + world.cameraY;

    // sliced-off overhang -> debris
    if (c.x < left)  flingDebris(c.x, placedTop, left - c.x, idx, -0.12);
    if (c.x + c.width > right) flingDebris(right, placedTop, (c.x + c.width) - right, idx, 0.12);

    world.blocks.push({ x: left, width: overlap });
    world.score++;
    scoreEl.textContent = world.score;
    spawnCurrent();
  }

  function flingDebris(x, sy, width, idx, vx) {
    world.debris.push({ sx: x, sy, width, color: hue(idx), vx, vy: 0, rot: 0, vr: vx * 0.004, alpha: 1 });
  }

  // ---- 6. RENDER ----
  function render() {
    ctx.clearRect(0, 0, W, H);

    // settled tower
    for (let i = 0; i < world.blocks.length; i++) {
      drawBlock(world.blocks[i].x, screenTop(i), world.blocks[i].width, hue(i), 1);
    }
    // moving block
    if (world.current) {
      drawBlock(world.current.x, screenTop(world.blocks.length), world.current.width, hue(world.blocks.length), 1);
    }
    // debris
    for (const d of world.debris) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, d.alpha);
      ctx.translate(d.sx + d.width / 2, d.sy + BLOCK_H / 2);
      ctx.rotate(d.rot);
      drawBlockRaw(-d.width / 2, -BLOCK_H / 2, d.width, d.color);
      ctx.restore();
    }
    // perfect-drop pulses
    for (const p of world.pulses) {
      ctx.save();
      ctx.globalAlpha = p.life * 0.7;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      const grow = (1 - p.life) * 22;
      ctx.strokeRect(p.sx - p.w / 2 - grow, p.sy - grow, p.w + grow * 2, BLOCK_H + grow * 2);
      ctx.restore();
    }
  }

  function drawBlock(x, y, width, h, alpha) {
    ctx.globalAlpha = alpha;
    drawBlockRaw(x, y, width, h);
    ctx.globalAlpha = 1;
  }
  function drawBlockRaw(x, y, width, h) {
    ctx.fillStyle = `hsl(${h} 62% 56%)`;
    roundRect(x, y, width, BLOCK_H, 4);
    ctx.fill();
    ctx.fillStyle = `hsl(${h} 70% 70%)`; // top-edge highlight for a little depth
    roundRect(x, y, width, 4, 4);
    ctx.fill();
  }
  function roundRect(x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- 7. INPUT (one action: "tap") ----
  function tap() {
    if (phase === 'idle') start();
    else if (phase === 'playing') drop();
    else if (phase === 'over') start(); // retry
  }
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); if (phase === 'playing') drop(); });
  overlay.addEventListener('pointerdown', e => { e.preventDefault(); tap(); });
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); tap(); }
  });

  // ---- phase transitions (this is the "shell" the UI reacts to) ----
  function start() {
    world = freshWorld();
    spawnCurrent();
    scoreEl.textContent = '0';
    phase = 'playing';
    overlay.classList.add('hidden');
    hud.classList.add('show');
  }
  function gameOver() {
    phase = 'over';
    best = Math.max(best, world.score);
    document.querySelector('#overlay h1').textContent = 'GAME OVER';
    ovText.innerHTML = `You stacked <b style="color:#fff">${world.score}</b> ${world.score === 1 ? 'block' : 'blocks'}.`;
    ctaEl.textContent = 'Tap to retry';
    bestEl.textContent = best > 0 ? `Best this session: ${best}` : '';
    overlay.classList.remove('hidden');
    hud.classList.remove('show');
  }

  // ---- 8. BOOT + responsive sizing ----
  function resize() {
    dpr = window.devicePixelRatio || 1;
    const r = wrap.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  new ResizeObserver(resize).observe(wrap);
  resize();
  world = freshWorld(); // so the idle screen has something behind it if ever shown
  requestAnimationFrame(t => { last = t; loop(t); });
})();
</script>
